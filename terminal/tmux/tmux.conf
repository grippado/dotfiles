# tmux.conf — versionado em cangaço (terminal/tmux/tmux.conf)
# Symlink: ~/.tmux.conf -> este arquivo (via installers/terminal.sh)
# Recarregar: prefix + r

# ── Prefix (C-a estilo screen) ───────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── True color (essencial em Ghostty) ────────────────────────
# Confirme depois com: tmux info | grep -i RGB
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-ghostty:RGB"

# ── Navegação vim-style + resize ─────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Splits que abrem no cwd atual
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ── Mouse + copy-mode vi (macOS: pbcopy) ─────────────────────
set -g mouse on
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# ── Quality of life ──────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on
set -g set-clipboard on
bind r source-file ~/.tmux.conf \; display "tmux.conf recarregado!"

# Painel de controle dos harnesses (agent-dashboard) num popup
bind D display-popup -E -w 90% -h 90% "agent-dashboard"

# ── Plugins (TPM) ────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'omerxx/tmux-sessionx'

# Persistência de sessão (crítico p/ orquestração de agentes)
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Status line Catppuccin (pin de versão: v2 quebrou a API da v1)
set -g @plugin 'catppuccin/tmux#v2.1.2'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"

# Última linha, obrigatoriamente:
run '~/.tmux/plugins/tpm/tpm'
